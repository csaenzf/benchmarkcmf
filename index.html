      <div style={{fontSize:10,color:P.t2,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>MÉTRICA</div>
      {banks.map(b=><div key={b} style={{fontSize:10,color:b===highlight?P.accent:P.t2,fontWeight:b===highlight?800:600,textAlign:"right",fontFamily:"'JetBrains Mono',monospace"}}>{SHORT[b]}</div>)}
    </div>
    {/* Rows */}
    {rows.map((r,i)=>{
      const vals=banks.map(b=>{const m=STRAT.find(x=>x.b===b);return m?m[r.field]:null;});
      const sorted=[...vals].filter(v=>v!=null).sort((a,b)=>r.reverse?(a-b):(b-a));
      return(<div key={i} style={{display:"grid",gridTemplateColumns:`160px repeat(${banks.length},1fr)`,padding:"8px 14px",borderBottom:i<rows.length-1?`1px solid ${P.border}`:"none",alignItems:"center"}}>
        <div><div style={{fontSize:11,color:P.t1,fontWeight:600}}>{r.label}</div>{r.sub&&<div style={{fontSize:9,color:P.t2,marginTop:1}}>{r.sub}</div>}</div>
        {banks.map((b,j)=>{
          const v=vals[j];
          const rank=v!=null?sorted.indexOf(v)+1:-1;
          const isHL=b===highlight;
          const isBest=rank===1;
          const isWorst=rank===sorted.length;
          return(<div key={b} style={{textAlign:"right"}}>
            <div style={{fontSize:13,fontWeight:isHL?800:500,color:isHL?P.t1:P.t2,fontFamily:"'JetBrains Mono',monospace"}}>
              {r.fmt==="$"?fmtCLP(v):r.fmt==="%"?fmtP(v):r.fmt==="x"?(v?.toFixed(1)||"-"):fmt(v)}
            </div>
            {isHL&&isBest&&<Badge color={P.green}>★ #1</Badge>}
            {isHL&&isWorst&&<Badge color={P.red}>#6</Badge>}
            {isHL&&!isBest&&!isWorst&&rank>0&&<Badge color={P.amber}>#{rank}</Badge>}
          </div>);
        })}
      </div>);
    })}
  </div>);
};

/* ═══ RANKING BAR (improved with values) ═══ */
const RankBar=({kpi,prod="C",ta="X",unit=""})=>{
  const data=BN.map(b=>({bank:b,val:gv(b,kpi,prod,ta)})).filter(d=>d.val!=null).sort((a,b)=>b.val-a.val);
  const max=data[0]?.val||1;
  return(<div style={{display:"flex",flexDirection:"column",gap:5}}>
    {data.map((d,i)=>{const isHL=d.bank==="Banco de Chile";const pct=d.val/max*100;
    return(<div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
      <div style={{width:70,fontSize:10,color:isHL?P.accent:P.t2,fontWeight:isHL?800:500,textAlign:"right",flexShrink:0,fontFamily:"'DM Sans',sans-serif"}}>{SHORT[d.bank]}</div>
      <div style={{flex:1,height:24,background:"rgba(255,255,255,0.03)",borderRadius:4,position:"relative",overflow:"hidden"}}>
        <div style={{width:`${pct}%`,height:"100%",background:isHL?`linear-gradient(90deg,${P.bchi},${P.bchiL})`:`${BC[d.bank]}44`,borderRadius:4,minWidth:2}}/>
      </div>
      <div style={{width:80,fontSize:11,fontWeight:isHL?800:500,color:isHL?P.t1:P.t2,textAlign:"right",fontFamily:"'JetBrains Mono',monospace",flexShrink:0}}>
        {unit==="$"?`$${fmt(d.val)}`:fmt(d.val)}
      </div>
    </div>);})}
  </div>);
};

/* ═══ TOOLTIP ═══ */
const TT=({active,payload,label})=>{
  if(!active||!payload?.length)return null;
  return(<div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:8,padding:"8px 12px",boxShadow:"0 8px 24px rgba(0,0,0,0.5)"}}>
    <div style={{fontSize:10,color:P.t2,marginBottom:4,fontFamily:"'JetBrains Mono',monospace"}}>{label}</div>
    {payload.sort((a,b)=>(b.value||0)-(a.value||0)).map((p,i)=>(
      <div key={i} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:P.t1,marginBottom:1}}>
        <span style={{width:7,height:7,borderRadius:"50%",background:p.color,flexShrink:0}}/>
        <span style={{flex:1,fontWeight:p.name==="Banco de Chile"?700:400}}>{p.name}</span>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>{typeof p.value==="number"?p.value.toFixed(1):p.value}</span>
      </div>
    ))}
  </div>);
};

const TABS=[{id:"overview",l:"Resumen"},{id:"market",l:"Market Share"},{id:"strategic",l:"Estratégico"},{id:"crosssell",l:"Cross-Sell"},{id:"avances",l:"Avances"},{id:"adicional",l:"Adicionales"}];

/* ═══════════════ MAIN ═══════════════ */
function Dashboard(){
  const[tab,setTab]=useState("overview");
  const[prod,setProd]=useState("C");
  const[ta,setTa]=useState("X");
  const[msKPI,setMsKPI]=useState("cards");
  const[trendM,setTrendM]=useState("a");

  const msData=useMemo(()=>{
    const src=msKPI==="cards"?MS.cards:MS.spend;
    const dates=[...new Set(src.map(d=>d.d))].sort();
    return dates.map(d=>{const row={d};src.filter(x=>x.d===d).forEach(x=>{row[x.b]=x.s});return row;});
  },[msKPI]);

  const trendData=useMemo(()=>{
    const dates=[...new Set(DT.map(d=>d.q))].sort();
    return dates.map(q=>{const row={q};DT.filter(d=>d.q===q).forEach(d=>{row[d.b]=d[trendM]});return row;});
  },[trendM]);

  const trendLabel={a:"Tasa Activación (%)",t:"Ticket Promedio ($)",s:"Spend / Tarjeta Activa ($)"};
  const trendFmt={a:v=>v+"%",t:v=>"$"+fmt(v),s:v=>"$"+fmt(v)};

  const taLabel={X:"Total",T:"Titular",A:"Adicional"};
  const prodLabel={C:"Crédito",D:"Débito"};

  return(<div style={{background:P.bg,minHeight:"100vh",color:P.t1,fontFamily:"'DM Sans',sans-serif"}}>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>

    {/* HEADER */}
    <div style={{background:`linear-gradient(135deg,${P.bchi},#001A52)`,padding:"22px 22px 16px",borderBottom:`2px solid ${P.accent}`,position:"relative"}}>
      <div style={{position:"absolute",top:-30,right:-10,width:160,height:160,borderRadius:"50%",background:"rgba(196,169,98,0.06)"}}/>
      <h1 style={{fontSize:17,fontWeight:800,color:"#fff",margin:0}}>Banco de Chile — Competitive Intelligence Dashboard</h1>
      <p style={{fontSize:10,color:"rgba(255,255,255,0.5)",margin:"3px 0 0",fontFamily:"'JetBrains Mono',monospace"}}>Fuente: CMF Chile · Informes Tarjetas Bancarias · Diciembre 2025</p>
    </div>

    {/* NAV */}
    <div style={{display:"flex",background:P.card,borderBottom:`1px solid ${P.border}`,overflow:"auto"}}>
      {TABS.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 4px",background:tab===t.id?P.card2:"transparent",border:"none",borderBottom:tab===t.id?`2px solid ${P.accent}`:"2px solid transparent",color:tab===t.id?P.t1:P.t2,fontSize:11,fontWeight:tab===t.id?700:500,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap"}}>{t.l}</button>
      ))}
    </div>

    <div style={{padding:"0 18px 40px",maxWidth:940,margin:"0 auto"}}>

      {/* ═══ OVERVIEW ═══ */}
      {tab==="overview"&&<>
        {/* Filters */}
        <div style={{display:"flex",gap:6,marginTop:16,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{fontSize:10,color:P.t2,marginRight:4}}>Producto:</span>
          <Pill active={prod==="C"} onClick={()=>setProd("C")}>Crédito</Pill>
          <Pill active={prod==="D"} onClick={()=>setProd("D")}>Débito</Pill>
          <span style={{fontSize:10,color:P.t2,marginLeft:12,marginRight:4}}>Tipo:</span>
          <Pill active={ta==="X"} onClick={()=>setTa("X")}>Total</Pill>
          <Pill active={ta==="T"} onClick={()=>setTa("T")}>Titular</Pill>
          <Pill active={ta==="A"} onClick={()=>setTa("A")}>Adicional</Pill>
        </div>

        <Sec title={`Tarjetas Vigentes — ${prodLabel[prod]} (${taLabel[ta]})`} sub="Ranking entre bancos principales · Dic 2025">
          <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:"16px 18px"}}>
            <RankBar kpi="Tarjetas Vigentes" prod={prod} ta={ta}/>
          </div>
        </Sec>

        <Sec title={`Tarjetas con Operaciones — ${prodLabel[prod]} (${taLabel[ta]})`}>
          <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:"16px 18px"}}>
            <RankBar kpi="Tarjetas con Operaciones" prod={prod} ta={ta}/>
          </div>
        </Sec>

        {prod==="C"&&ta==="X"&&<>
          <Sec title="Monto Compras" sub="MM$ mensuales">
            <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:"16px 18px"}}>
              <RankBar kpi="Monto Compras" prod="C" ta="X" unit="$"/>
            </div>
          </Sec>
          <Sec title="Nro Compras" sub="Transacciones mensuales">
            <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:"16px 18px"}}>
              <RankBar kpi="Nro Compras" prod="C" ta="X"/>
            </div>
          </Sec>
        </>}

        {prod==="D"&&ta==="X"&&<>
          <Sec title="Monto Transacciones Débito" sub="MM$ mensuales">
            <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:"16px 18px"}}>
              <RankBar kpi="Monto Transacciones" prod="D" ta="X" unit="$"/>
            </div>
          </Sec>
          <Sec title="Nro Transacciones Débito">
            <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:"16px 18px"}}>
              <RankBar kpi="Nro Transacciones" prod="D" ta="X"/>
            </div>
          </Sec>
        </>}

        <Sec title="Crecimiento YoY" sub="Variación Dic 2024 → Dic 2025 · Crédito">
          <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,overflow:"hidden"}}>
            <div style={{display:"grid",gridTemplateColumns:`100px repeat(${BN.length},1fr)`,padding:"8px 14px",background:P.card2,borderBottom:`1px solid ${P.border}`}}>
              <div style={{fontSize:10,color:P.t2,fontWeight:600}}>KPI</div>
              {BN.map(b=><div key={b} style={{fontSize:10,color:b==="Banco de Chile"?P.accent:P.t2,fontWeight:b==="Banco de Chile"?800:500,textAlign:"right",fontFamily:"'JetBrains Mono',monospace"}}>{SHORT[b]}</div>)}
            </div>
            {["Tarjetas Vigentes","Monto Compras","Nro Compras"].map(kpi=>(
              <div key={kpi} style={{display:"grid",gridTemplateColumns:`100px repeat(${BN.length},1fr)`,padding:"7px 14px",borderBottom:`1px solid ${P.border}`}}>
                <div style={{fontSize:11,color:P.t1,fontWeight:600}}>{kpi.replace("Tarjetas ","Tarj. ")}</div>
                {BN.map(b=>{const r=YOY.find(y=>y.b===b&&y.k===kpi);const v=r?.y;
                  return(<div key={b} style={{textAlign:"right",fontSize:12,fontWeight:b==="Banco de Chile"?800:500,color:v==null?P.t2:v>=0?P.green:P.red,fontFamily:"'JetBrains Mono',monospace"}}>
                    {v!=null?`${v>=0?"▲":"▼"}${Math.abs(v)}%`:"-"}
                  </div>);
                })}
              </div>
            ))}
          </div>
        </Sec>
      </>}

      {/* ═══ MARKET SHARE ═══ */}
      {tab==="market"&&<>
        <Sec title="Evolución Market Share" sub="Trimestral — % del sistema financiero · Crédito">
          <div style={{display:"flex",gap:6,marginBottom:12}}>
            <Pill active={msKPI==="cards"} onClick={()=>setMsKPI("cards")}>Tarjetas Vigentes</Pill>
            <Pill active={msKPI==="spend"} onClick={()=>setMsKPI("spend")}>Monto Compras</Pill>
          </div>
          <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:"14px 8px 4px"}}>
            <ResponsiveContainer width="100%" height={340}>
              <LineChart data={msData} margin={{top:10,right:8,left:-12,bottom:0}}>
                <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)"/>
                <XAxis dataKey="d" tick={{fontSize:9,fill:P.t2}} tickLine={false} axisLine={{stroke:P.border}}/>
                <YAxis tick={{fontSize:9,fill:P.t2}} tickLine={false} axisLine={false} tickFormatter={v=>v+"%"}/>
                <Tooltip content={<TT/>}/>
                {BN.map(b=><Line key={b} dataKey={b} stroke={BC[b]} strokeWidth={b==="Banco de Chile"?3:1.5} dot={false} strokeOpacity={b==="Banco de Chile"?1:0.5} connectNulls/>)}
              </LineChart>
            </ResponsiveContainer>
          </div>
          <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:8,flexWrap:"wrap"}}>
            {BN.map(b=><div key={b} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:b==="Banco de Chile"?P.t1:P.t2}}>
              <span style={{width:12,height:b==="Banco de Chile"?3:2,borderRadius:2,background:BC[b]}}/>
              {b}
            </div>)}
          </div>
        </Sec>
      </>}

      {/* ═══ STRATEGIC ═══ */}
      {tab==="strategic"&&<>
        <Sec title="Benchmark Competitivo" sub="Todas las métricas derivadas — valor por banco">
          <CompTable rows={[
            {label:"Tasa Activación",sub:"TC c/ops / TC vigentes",field:"act_rate",fmt:"%"},
            {label:"Frecuencia",sub:"Compras / tarjeta activa",field:"freq",fmt:"x"},
            {label:"Ticket Promedio",sub:"Monto / Nro compras",field:"ticket",fmt:"$"},
            {label:"Spend / Activa",sub:"Monto compras / TC c/ops",field:"spend_active",fmt:"$"},
          ]}/>
        </Sec>

        <Sec title="Tendencias Métricas Derivadas" sub="BdCh vs Santander vs Itaú — trimestral">
          <div style={{display:"flex",gap:6,marginBottom:12}}>
            <Pill active={trendM==="a"} onClick={()=>setTrendM("a")}>Activación</Pill>
            <Pill active={trendM==="t"} onClick={()=>setTrendM("t")}>Ticket</Pill>
            <Pill active={trendM==="s"} onClick={()=>setTrendM("s")}>Spend/Activa</Pill>
          </div>
          <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:"14px 8px 4px"}}>
            <ResponsiveContainer width="100%" height={300}>
              <LineChart data={trendData} margin={{top:10,right:8,left:-5,bottom:0}}>
                <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)"/>
                <XAxis dataKey="q" tick={{fontSize:9,fill:P.t2}} tickLine={false} axisLine={{stroke:P.border}}/>
                <YAxis tick={{fontSize:9,fill:P.t2}} tickLine={false} axisLine={false} tickFormatter={trendFmt[trendM]}/>
                <Tooltip content={<TT/>}/>
                {["Banco de Chile","Santander","Itaú"].map(b=><Line key={b} dataKey={b} stroke={BC[b]} strokeWidth={b==="Banco de Chile"?3:1.5} dot={false} strokeOpacity={b==="Banco de Chile"?1:0.5} connectNulls/>)}
              </LineChart>
            </ResponsiveContainer>
          </div>
        </Sec>
      </>}

      {/* ═══ CROSS-SELL ═══ */}
      {tab==="crosssell"&&<>
        <Sec title="Cross-Sell & Product Mix" sub="¿Qué tan bien se monetiza la base débito con crédito?">
          <CompTable rows={[
            {label:"TC / TD Vigentes",sub:"Penetración crédito sobre débito",field:"tc_td",fmt:"%"},
            {label:"Monto TC / (TC+TD)",sub:"Share crédito en gasto total",field:"credit_spend_pct",fmt:"%"},
            {label:"Ticket Débito",sub:"Monto / Nro transacciones",field:"ticket_deb",fmt:"$"},
            {label:"Freq. Débito",sub:"Txn débito / tarjeta vigente",field:"deb_freq",fmt:"x"},
          ]}/>
        </Sec>

        <Sec title="Diagnóstico">
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[{t:"BdCh: 45% TC/TD",d:"Con 4M tarjetas débito y 1.8M crédito, solo 45% de penetración. Itaú tiene 108%. Enorme oportunidad de venta cruzada.",c:P.amber},
              {t:"Gasto 46% crédito",d:"Casi la mitad del gasto va por débito. Mover hacia crédito mejora interchange fee y rentabilidad total.",c:P.bchiL},
            ].map((c,i)=><div key={i} style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:"14px 16px",borderLeft:`3px solid ${c.c}`}}>
              <div style={{fontSize:12,fontWeight:700,color:P.t1,marginBottom:4}}>{c.t}</div>
              <div style={{fontSize:11,color:P.t2,lineHeight:1.5}}>{c.d}</div>
            </div>)}
          </div>
        </Sec>
      </>}

      {/* ═══ AVANCES ═══ */}
      {tab==="avances"&&<>
        <Sec title="Análisis de Avances en Efectivo" sub="Revenue mix y riesgo">
          <CompTable rows={[
            {label:"Avances / Total TC",sub:"Peso en revenue mix",field:"avance_pct",fmt:"%",reverse:true},
            {label:"Ticket Avance",sub:"Monto promedio avance",field:"avance_ticket",fmt:"$"},
            {label:"Ticket Compras",sub:"Para comparar",field:"ticket",fmt:"$"},
          ]}/>
        </Sec>
        <Sec title="Diagnóstico">
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[{t:"BdCh: 8.7% en avances",d:"Exposición moderada. Genera revenue adicional sin excesivo riesgo. Ticket de avance ($510K) es 10x el de compras.",c:P.accent},
              {t:"BancoEstado: 24.5%",d:"Un cuarto del monto en avances con ticket bajo ($192K). Base con alta necesidad de liquidez y alto riesgo crediticio.",c:P.red},
            ].map((c,i)=><div key={i} style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:"14px 16px",borderLeft:`3px solid ${c.c}`}}>
              <div style={{fontSize:12,fontWeight:700,color:P.t1,marginBottom:4}}>{c.t}</div>
              <div style={{fontSize:11,color:P.t2,lineHeight:1.5}}>{c.d}</div>
            </div>)}
          </div>
        </Sec>
      </>}

      {/* ═══ ADICIONALES ═══ */}
      {tab==="adicional"&&<>
        <Sec title="Tarjetas Adicionales" sub="% de adicionales sobre el total de tarjetas vigentes">
          <div style={{display:"flex",gap:6,marginBottom:12}}>
            <Pill active={prod==="C"} onClick={()=>setProd("C")}>Crédito</Pill>
            <Pill active={prod==="D"} onClick={()=>setProd("D")}>Débito</Pill>
          </div>
          <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,overflow:"hidden"}}>
            <div style={{display:"grid",gridTemplateColumns:"90px 1fr 90px 90px 70px",padding:"8px 14px",background:P.card2,borderBottom:`1px solid ${P.border}`}}>
              {["Banco","","Total","Adicionales","% Adic."].map((h,i)=><div key={i} style={{fontSize:10,color:P.t2,fontWeight:600,textAlign:i>1?"right":"left",fontFamily:"'JetBrains Mono',monospace"}}>{h}</div>)}
            </div>
            {ADIC.filter(a=>a.p===prod).sort((a,b)=>b.r-a.r).map((a,i)=>{
              const isHL=a.b==="Banco de Chile";const maxR=ADIC.filter(x=>x.p===prod).reduce((m,x)=>Math.max(m,x.r),0);
              return(<div key={i} style={{display:"grid",gridTemplateColumns:"90px 1fr 90px 90px 70px",padding:"7px 14px",borderBottom:`1px solid ${P.border}`,alignItems:"center"}}>
                <div style={{fontSize:11,color:isHL?P.accent:P.t2,fontWeight:isHL?800:500}}>{SHORT[a.b]}</div>
                <div style={{height:16,background:"rgba(255,255,255,0.03)",borderRadius:3,overflow:"hidden"}}>
                  <div style={{width:`${a.r/maxR*100}%`,height:"100%",background:isHL?P.bchi:`${BC[a.b]}55`,borderRadius:3}}/>
                </div>
                <div style={{fontSize:11,color:isHL?P.t1:P.t2,textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontWeight:isHL?700:400}}>{fmt(a.x)}</div>
                <div style={{fontSize:11,color:isHL?P.t1:P.t2,textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontWeight:isHL?700:400}}>{fmt(a.a)}</div>
                <div style={{fontSize:12,color:isHL?P.accent:P.t1,textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontWeight:800}}>{a.r}%</div>
              </div>);
            })}
          </div>
        </Sec>
        <Sec title="Diagnóstico">
          <div style={{display:"grid",gridTemplateColumns:"1fr",gap:10}}>
            {[{t:"Crédito: Itaú lidera con 17.5% de adicionales",d:"BdCh está en 13.5%, similar a Scotiabank (13.3%). Santander tiene 16.8%. BancoEstado prácticamente no vende adicionales (1.6%). Oportunidad para BdCh: cada punto de mejora son ~18K tarjetas adicionales nuevas.",c:P.accent},
              {t:"Débito: Scotiabank es el outlier con 15.3%",d:"En débito las adicionales son marginales para la mayoría (<3%), excepto Scotiabank. BdCh tiene solo 1.1%, lo cual es esperable dado que el débito es producto individual por naturaleza.",c:P.t2},
            ].map((c,i)=><div key={i} style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:"14px 16px",borderLeft:`3px solid ${c.c}`}}>
              <div style={{fontSize:12,fontWeight:700,color:P.t1,marginBottom:4}}>{c.t}</div>
              <div style={{fontSize:11,color:P.t2,lineHeight:1.5}}>{c.d}</div>
            </div>)}
          </div>
        </Sec>
      </>}

      {/* FOOTER */}
      <div style={{marginTop:44,paddingTop:14,borderTop:`1px solid ${P.border}`,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:6}}>
        <span style={{fontSize:9,color:P.t2,fontFamily:"'JetBrains Mono',monospace"}}>Fuente: CMF Chile · Informes Tarjetas Bancarias</span>
        <span style={{fontSize:9,color:P.t2,fontFamily:"'JetBrains Mono',monospace"}}>Visa Consulting & Analytics Framework · Dic 2025</span>
      </div>
    </div>
  </div>);
}


ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
</script>
</body>
</html>
