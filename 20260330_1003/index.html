/* ═══ CHART.JS WRAPPER ═══ */
const CJLine=({dates,lines,suffix})=>{
  const ref=useRef(null);const chart=useRef(null);
  useEffect(()=>{
    if(chart.current)chart.current.destroy();
    const ctx=ref.current.getContext('2d');
    chart.current=new Chart(ctx,{
      type:'line',
      data:{labels:dates,datasets:lines.map(l=>({
        label:l.name,data:dates.map(d=>l.data[d]!=null?l.data[d]:null),
        borderColor:l.color,borderWidth:l.name==="Banco de Chile"?3:1.5,
        pointRadius:0,tension:0.3,spanGaps:true
      }))},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{backgroundColor:'#111827',borderColor:'#1E293B',borderWidth:1,titleColor:'#94A3B8',bodyColor:'#F1F5F9',
          callbacks:{label:(c)=>c.dataset.label+': '+(suffix==='%'?c.parsed.y.toFixed(1)+'%':suffix==='$'?'$'+fmt(c.parsed.y):c.parsed.y)}}},
        scales:{x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#94A3B8',font:{size:10}}},
          y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#94A3B8',font:{size:10},callback:(v)=>suffix==='%'?v+'%':suffix==='$'?'$'+fmt(v):v}}}}
    });
    return()=>{if(chart.current)chart.current.destroy()};
  },[dates,lines,suffix]);
  return <canvas ref={ref}/>;
};

const Pill=({active,onClick,children})=><button onClick={onClick} style={{padding:"5px 12px",borderRadius:6,border:`1px solid ${active?P.accent:P.border}`,background:active?"rgba(196,169,98,0.12)":"transparent",color:active?P.accent:P.t2,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>{children}</button>;
const Badge=({color=P.accent,children})=><span style={{fontSize:10,color,fontWeight:700,background:color+"1F",padding:"2px 7px",borderRadius:5,fontFamily:"'JetBrains Mono',monospace"}}>{children}</span>;
const Sec=({title,sub,children})=><div style={{marginTop:28}}><h2 style={{fontSize:16,fontWeight:800,color:P.t1,margin:0}}>{title}</h2>{sub&&<p style={{fontSize:10,color:P.t2,margin:"2px 0 0",fontFamily:"'JetBrains Mono',monospace"}}>{sub}</p>}<div style={{marginTop:12}}>{children}</div></div>;

/* ═══ COMP TABLE ═══ */
const thS={background:P.card2,padding:"9px 12px",textAlign:"right",fontSize:10,color:P.t2,fontWeight:600,fontFamily:"'JetBrains Mono',monospace",borderBottom:`1px solid ${P.border}`};
const tdS={padding:"8px 12px",textAlign:"right",fontSize:12,color:P.t2,fontFamily:"'JetBrains Mono',monospace",borderBottom:"1px solid rgba(30,41,59,0.4)"};
const CompTable=({rows})=><div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,overflowX:"auto"}}>
  <table style={{width:"100%",borderCollapse:"collapse",minWidth:580}}>
    <thead><tr><th style={{...thS,textAlign:"left",width:160}}>Métrica</th>
      {BN.map(b=><th key={b} style={{...thS,color:b==="Banco de Chile"?P.accent:P.t2,fontWeight:b==="Banco de Chile"?800:600}}>{SHORT[b]}</th>)}</tr></thead>
    <tbody>{rows.map((r,i)=>{
      const vals=BN.map(b=>{const m=STRAT.find(x=>x.b===b);return m?m[r.field]:null});
      const sorted=vals.filter(v=>v!=null).slice().sort((a,b)=>r.reverse?(a-b):(b-a));
      return <tr key={i}><td style={{...tdS,textAlign:"left",fontFamily:"'DM Sans',sans-serif",fontWeight:600,color:"#CBD5E1",fontSize:11}}>
        <div>{r.label}</div>{r.sub&&<div style={{fontSize:9,color:P.t2,marginTop:1}}>{r.sub}</div>}
      </td>{BN.map((b,j)=>{
        const v=vals[j];const isHL=b==="Banco de Chile";
        const rank=v!=null?sorted.indexOf(v)+1:-1;
        const d=r.fmt==="$"?fmtCLP(v):r.fmt==="%"?fmtP(v):r.fmt==="x"?(v!=null?v.toFixed(1):"-"):fmt(v);
        return <td key={b} style={{...tdS,color:isHL?P.accent:P.t2,fontWeight:isHL?800:400}}>
          <div>{d}</div>
          {isHL&&rank===1&&<Badge color={P.green}>★ #1</Badge>}
          {isHL&&rank===sorted.length&&rank>1&&<Badge color={P.red}>#{rank}</Badge>}
          {isHL&&rank>1&&rank<sorted.length&&<Badge color={P.amber}>#{rank}</Badge>}
        </td>;
      })}</tr>;
    })}</tbody>
  </table></div>;

/* ═══ RANKING BAR ═══ */
const RankBar=({kpi,prod="C",ta="X",unit=""})=>{
  const data=BN.map(b=>({bank:b,val:gv(b,kpi,prod,ta)})).filter(d=>d.val!=null).sort((a,b)=>b.val-a.val);
  const max=(data[0]&&data[0].val)||1;
  return <div style={{display:"flex",flexDirection:"column",gap:5}}>
    {data.map((d,i)=>{const isHL=d.bank==="Banco de Chile";const pct=d.val/max*100;
    return <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
      <div style={{width:70,fontSize:10,color:isHL?P.accent:P.t2,fontWeight:isHL?800:500,textAlign:"right",flexShrink:0}}>{SHORT[d.bank]}</div>
      <div style={{flex:1,height:24,background:"rgba(255,255,255,0.03)",borderRadius:4,overflow:"hidden"}}>
        <div style={{width:pct+"%",height:"100%",background:isHL?`linear-gradient(90deg,${P.bchi},${P.bchiL})`:BC[d.bank]+"44",borderRadius:4,minWidth:2}}/></div>
      <div style={{width:80,fontSize:11,fontWeight:isHL?800:500,color:isHL?P.t1:P.t2,textAlign:"right",fontFamily:"'JetBrains Mono',monospace",flexShrink:0}}>{unit==="$"?"$"+fmt(d.val):fmt(d.val)}</div>
    </div>})}
  </div>;
};

/* ═══ TABS ═══ */
const TABS=[{id:"overview",l:"Resumen"},{id:"market",l:"Market Share"},{id:"strategic",l:"Estratégico"},{id:"crosssell",l:"Cross-Sell"},{id:"avances",l:"Avances"},{id:"adicional",l:"Adicionales"}];

/* ═══ MAIN ═══ */
function Dashboard(){
  const[tab,setTab]=useState("overview");
  const[prod,setProd]=useState("C");
  const[ta,setTa]=useState("X");
  const[msKPI,setMsKPI]=useState("cards");
  const[trendM,setTrendM]=useState("a");
  const taLabel={X:"Total",T:"Titular",A:"Adicional"};
  const prodLabel={C:"Crédito",D:"Débito"};

  const msProps=useMemo(()=>{
    const src=msKPI==="cards"?MS.cards:MS.spend;
    const seen={};const dates=[];src.forEach(d=>{if(!seen[d.d]){seen[d.d]=true;dates.push(d.d)}});dates.sort();
    const ld={};BN.forEach(b=>{ld[b]={}});src.forEach(d=>{if(ld[d.b])ld[d.b][d.d]=d.s});
    return{dates,lines:BN.map(b=>({name:b,color:BC[b],data:ld[b]})),suffix:"%"};
  },[msKPI]);

  const trendProps=useMemo(()=>{
    const seen={};const dates=[];DT.forEach(d=>{if(!seen[d.q]){seen[d.q]=true;dates.push(d.q)}});dates.sort();
    const bks=["Banco de Chile","Santander","Itaú"];const ld={};bks.forEach(b=>{ld[b]={}});
    DT.forEach(d=>{if(ld[d.b])ld[d.b][d.q]=d[trendM]});
    return{dates,lines:bks.map(b=>({name:b,color:BC[b],data:ld[b]})),suffix:trendM==="a"?"%":"$"};
  },[trendM]);

  return <div style={{background:P.bg,minHeight:"100vh",color:P.t1,fontFamily:"'DM Sans',sans-serif"}}>
    <div style={{background:`linear-gradient(135deg,${P.bchi},#001A52)`,padding:"22px 22px 16px",borderBottom:`2px solid ${P.accent}`,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:-30,right:-10,width:160,height:160,borderRadius:"50%",background:"rgba(196,169,98,0.06)"}}/>
      <h1 style={{fontSize:17,fontWeight:800,color:"#fff",margin:0,position:"relative"}}>Banco de Chile — Competitive Intelligence Dashboard</h1>
      <p style={{fontSize:10,color:"rgba(255,255,255,0.5)",margin:"3px 0 0",fontFamily:"'JetBrains Mono',monospace",position:"relative"}}>Fuente: CMF Chile · Informes Tarjetas Bancarias · Diciembre 2025</p>
    </div>
    <div style={{display:"flex",background:P.card,borderBottom:`1px solid ${P.border}`,overflow:"auto"}}>
      {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 4px",background:tab===t.id?P.card2:"transparent",border:"none",borderBottom:tab===t.id?`2px solid ${P.accent}`:"2px solid transparent",color:tab===t.id?P.t1:P.t2,fontSize:11,fontWeight:tab===t.id?700:500,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap"}}>{t.l}</button>)}
    </div>
    <div style={{padding:"0 18px 40px",maxWidth:940,margin:"0 auto"}}>

      {tab==="overview"&&<div>
        <div style={{display:"flex",gap:6,marginTop:16,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{fontSize:10,color:P.t2,marginRight:4}}>Producto:</span>
          <Pill active={prod==="C"} onClick={()=>setProd("C")}>Crédito</Pill>
          <Pill active={prod==="D"} onClick={()=>setProd("D")}>Débito</Pill>
          <span style={{fontSize:10,color:P.t2,marginLeft:12,marginRight:4}}>Tipo:</span>
          <Pill active={ta==="X"} onClick={()=>setTa("X")}>Total</Pill>
          <Pill active={ta==="T"} onClick={()=>setTa("T")}>Titular</Pill>
          <Pill active={ta==="A"} onClick={()=>setTa("A")}>Adicional</Pill>
        </div>
        <Sec title={`Tarjetas Vigentes — ${prodLabel[prod]} (${taLabel[ta]})`} sub="Ranking · Dic 2025">
          <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:"16px 18px"}}><RankBar kpi="Tarjetas Vigentes" prod={prod} ta={ta}/></div></Sec>
        <Sec title={`Tarjetas con Operaciones — ${prodLabel[prod]} (${taLabel[ta]})`}>
          <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:"16px 18px"}}><RankBar kpi="Tarjetas con Operaciones" prod={prod} ta={ta}/></div></Sec>
        {prod==="C"&&ta==="X"&&<div>
          <Sec title="Monto Compras" sub="MM$ mensuales"><div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:"16px 18px"}}><RankBar kpi="Monto Compras" prod="C" ta="X" unit="$"/></div></Sec>
          <Sec title="Nro Compras"><div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:"16px 18px"}}><RankBar kpi="Nro Compras" prod="C" ta="X"/></div></Sec>
        </div>}
        {prod==="D"&&ta==="X"&&<div>
          <Sec title="Monto Transacciones Débito" sub="MM$"><div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:"16px 18px"}}><RankBar kpi="Monto Transacciones" prod="D" ta="X" unit="$"/></div></Sec>
          <Sec title="Nro Transacciones Débito"><div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:"16px 18px"}}><RankBar kpi="Nro Transacciones" prod="D" ta="X"/></div></Sec>
        </div>}
        <Sec title="Crecimiento YoY" sub="Dic 2024 → Dic 2025 · Crédito">
          <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:580}}>
              <thead><tr><th style={{...thS,textAlign:"left"}}>KPI</th>{BN.map(b=><th key={b} style={{...thS,color:b==="Banco de Chile"?P.accent:P.t2,fontWeight:b==="Banco de Chile"?800:600}}>{SHORT[b]}</th>)}</tr></thead>
              <tbody>{["Tarjetas Vigentes","Monto Compras","Nro Compras"].map(kpi=><tr key={kpi}>
                <td style={{...tdS,textAlign:"left",fontFamily:"'DM Sans',sans-serif",fontWeight:600,color:"#CBD5E1",fontSize:11}}>{kpi}</td>
                {BN.map(b=>{const yr=YOY.find(y=>y.b===b&&y.k===kpi);const v=yr?yr.y:null;const isHL=b==="Banco de Chile";
                  return <td key={b} style={{...tdS,color:v==null?P.t2:v>=0?P.green:P.red,fontWeight:isHL?800:500}}>
                    {v!=null?((v>=0?"▲":"▼")+Math.abs(v)+"%"):"-"}</td>})}
              </tr>)}</tbody></table></div></Sec>
      </div>}

      {tab==="market"&&<div>
        <Sec title="Evolución Market Share" sub="Trimestral — % del sistema · Crédito">
          <div style={{display:"flex",gap:6,marginBottom:12}}>
            <Pill active={msKPI==="cards"} onClick={()=>setMsKPI("cards")}>Tarjetas Vigentes</Pill>
            <Pill active={msKPI==="spend"} onClick={()=>setMsKPI("spend")}>Monto Compras</Pill>
          </div>
          <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:"16px 12px"}}>
            <div style={{height:340}}><CJLine dates={msProps.dates} lines={msProps.lines} suffix={msProps.suffix}/></div></div>
          <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:10,flexWrap:"wrap"}}>
            {BN.map(b=><div key={b} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:b==="Banco de Chile"?P.t1:P.t2}}>
              <span style={{width:12,height:b==="Banco de Chile"?3:2,borderRadius:2,background:BC[b],display:"inline-block"}}/>{b}</div>)}</div>
        </Sec></div>}

      {tab==="strategic"&&<div>
        <Sec title="Benchmark Competitivo" sub="Métricas derivadas">
          <CompTable rows={[{label:"Tasa Activación",sub:"TC c/ops / TC vigentes",field:"act_rate",fmt:"%"},{label:"Frecuencia",sub:"Compras / tarjeta activa",field:"freq",fmt:"x"},{label:"Ticket Promedio",sub:"Monto / Nro compras",field:"ticket",fmt:"$"},{label:"Spend / Activa",sub:"Monto compras / TC c/ops",field:"spend_active",fmt:"$"}]}/></Sec>
        <Sec title="Tendencias" sub="BdCh vs Santander vs Itaú — trimestral">
          <div style={{display:"flex",gap:6,marginBottom:12}}>
            <Pill active={trendM==="a"} onClick={()=>setTrendM("a")}>Activación</Pill>
            <Pill active={trendM==="t"} onClick={()=>setTrendM("t")}>Ticket</Pill>
            <Pill active={trendM==="s"} onClick={()=>setTrendM("s")}>Spend/Activa</Pill>
          </div>
          <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:"16px 12px"}}>
            <div style={{height:300}}><CJLine dates={trendProps.dates} lines={trendProps.lines} suffix={trendProps.suffix}/></div></div>
        </Sec></div>}

      {tab==="crosssell"&&<div>
        <Sec title="Cross-Sell y Product Mix" sub="Penetración crédito sobre base débito">
          <CompTable rows={[{label:"TC / TD Vigentes",sub:"Penetración crédito",field:"tc_td",fmt:"%"},{label:"Monto TC / (TC+TD)",sub:"Share crédito en gasto",field:"credit_spend_pct",fmt:"%"},{label:"Ticket Débito",field:"ticket_deb",fmt:"$"},{label:"Freq. Débito",sub:"Txn / tarjeta",field:"deb_freq",fmt:"x"}]}/></Sec>
        <Sec title="Diagnóstico"><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={{background:P.card2,border:`1px solid ${P.border}`,borderRadius:10,padding:"14px 16px",borderLeft:`3px solid ${P.accent}`}}><div style={{fontSize:12,fontWeight:700,color:P.t1,marginBottom:4}}>BdCh: 45% TC/TD</div><div style={{fontSize:11,color:P.t2,lineHeight:1.5}}>4M TD y 1.8M TC. Itaú tiene 108%. Cada punto de mejora son ~40K tarjetas.</div></div>
          <div style={{background:P.card2,border:`1px solid ${P.border}`,borderRadius:10,padding:"14px 16px",borderLeft:`3px solid ${P.bchiL}`}}><div style={{fontSize:12,fontWeight:700,color:P.t1,marginBottom:4}}>Gasto 46% crédito</div><div style={{fontSize:11,color:P.t2,lineHeight:1.5}}>Mover hacia crédito mejora interchange fee y rentabilidad.</div></div>
        </div></Sec></div>}

      {tab==="avances"&&<div>
        <Sec title="Avances en Efectivo" sub="Revenue mix y riesgo">
          <CompTable rows={[{label:"Avances / Total TC",sub:"Peso revenue mix",field:"avance_pct",fmt:"%",reverse:true},{label:"Ticket Avance",field:"avance_ticket",fmt:"$"},{label:"Ticket Compras",sub:"Comparación",field:"ticket",fmt:"$"}]}/></Sec>
        <Sec title="Diagnóstico"><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={{background:P.card2,border:`1px solid ${P.border}`,borderRadius:10,padding:"14px 16px",borderLeft:`3px solid ${P.accent}`}}><div style={{fontSize:12,fontWeight:700,color:P.t1,marginBottom:4}}>BdCh: 8.7%</div><div style={{fontSize:11,color:P.t2,lineHeight:1.5}}>Exposición moderada. Ticket $510K es 10x el de compras.</div></div>
          <div style={{background:P.card2,border:`1px solid ${P.border}`,borderRadius:10,padding:"14px 16px",borderLeft:`3px solid ${P.red}`}}><div style={{fontSize:12,fontWeight:700,color:P.t1,marginBottom:4}}>BancoEstado: 24.5%</div><div style={{fontSize:11,color:P.t2,lineHeight:1.5}}>Un cuarto en avances. Ticket bajo ($192K). Alto riesgo.</div></div>
        </div></Sec></div>}

      {tab==="adicional"&&<div>
        <Sec title="Tarjetas Adicionales" sub="% adicionales sobre total vigentes">
          <div style={{display:"flex",gap:6,marginBottom:12}}>
            <Pill active={prod==="C"} onClick={()=>setProd("C")}>Crédito</Pill>
            <Pill active={prod==="D"} onClick={()=>setProd("D")}>Débito</Pill></div>
          <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr>{["Banco","","Total","Adicionales","% Adic."].map((h,i)=><th key={i} style={{...thS,textAlign:i<2?"left":"right"}}>{h}</th>)}</tr></thead>
              <tbody>{ADIC.filter(a=>a.p===prod).sort((a,b)=>b.r-a.r).map((a,i)=>{
                const isHL=a.b==="Banco de Chile";const maxR=ADIC.filter(x=>x.p===prod).reduce((m,x)=>Math.max(m,x.r),0);
                return <tr key={i}>
                  <td style={{...tdS,textAlign:"left",fontFamily:"'DM Sans'",fontWeight:isHL?800:500,color:isHL?P.accent:P.t2}}>{SHORT[a.b]}</td>
                  <td style={{...tdS}}><div style={{height:16,background:"rgba(255,255,255,0.03)",borderRadius:3,overflow:"hidden"}}><div style={{width:(a.r/maxR*100)+"%",height:"100%",background:isHL?P.bchi:BC[a.b]+"55",borderRadius:3}}/></div></td>
                  <td style={{...tdS,color:isHL?P.t1:P.t2,fontWeight:isHL?700:400}}>{fmt(a.x)}</td>
                  <td style={{...tdS,color:isHL?P.t1:P.t2,fontWeight:isHL?700:400}}>{fmt(a.a)}</td>
                  <td style={{...tdS,color:isHL?P.accent:P.t1,fontWeight:800}}>{a.r}%</td>
                </tr>})}</tbody></table></div></Sec>
        <Sec title="Diagnóstico"><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={{background:P.card2,border:`1px solid ${P.border}`,borderRadius:10,padding:"14px 16px",borderLeft:`3px solid ${P.accent}`}}><div style={{fontSize:12,fontWeight:700,color:P.t1,marginBottom:4}}>Crédito: Itaú lidera 17.5%</div><div style={{fontSize:11,color:P.t2,lineHeight:1.5}}>BdCh en 13.5%. Cada punto son ~18K tarjetas adicionales.</div></div>
          <div style={{background:P.card2,border:`1px solid ${P.border}`,borderRadius:10,padding:"14px 16px",borderLeft:`3px solid ${P.t2}`}}><div style={{fontSize:12,fontWeight:700,color:P.t1,marginBottom:4}}>Débito: producto individual</div><div style={{fontSize:11,color:P.t2,lineHeight:1.5}}>Scotiabank outlier 15.3%. BdCh 1.1%, esperable.</div></div>
        </div></Sec></div>}

      <div style={{marginTop:44,paddingTop:14,borderTop:`1px solid ${P.border}`,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <span style={{fontSize:9,color:"#64748B",fontFamily:"'JetBrains Mono',monospace"}}>Fuente: CMF Chile · Informes Tarjetas Bancarias</span>
        <span style={{fontSize:9,color:"#64748B",fontFamily:"'JetBrains Mono',monospace"}}>Visa Consulting & Analytics · Dic 2025</span>
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Dashboard));
</script>
</body>
</html>
