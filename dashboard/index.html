/* ═══ RANKING BAR — share inside bar ═══ */
function RankBar(props){
  var month=props.month;var kpi=props.kpi;var prod=props.prod||"C";var ta=props.ta||"X";var unit=props.unit||"";
  var ABK=props.active||BN;
  var data=ABK.map(function(b){return{bank:b,val:gv(month,b,kpi,prod,ta)}}).filter(function(d){return d.val!=null}).sort(function(a,b){return b.val-a.val});
  var total=0;data.forEach(function(d){total+=d.val});
  var mi=MONTHS.indexOf(month);
  var prevMonth=mi>=1?MONTHS[mi-1]:null;
  var prevYear=mi>=12?MONTHS[mi-12]:null;

  return ce('div',{style:{display:"flex",flexDirection:"column",gap:5}},
    /* Header row */
    ce('div',{style:{display:"flex",alignItems:"center",gap:6,marginBottom:2}},
      ce('div',{style:{width:52}}),
      ce('div',{style:{flex:1,fontSize:9,color:P.t2,fontFamily:"'JetBrains Mono',monospace",textAlign:"center"}}),
      ce('div',{style:{width:82,fontSize:9,color:P.t2,fontFamily:"'JetBrains Mono',monospace",textAlign:"right"}},"Valor"),
      ce('div',{style:{width:50,fontSize:9,color:P.t2,fontFamily:"'JetBrains Mono',monospace",textAlign:"right"}},"YoY"),
      ce('div',{style:{width:50,fontSize:9,color:P.t2,fontFamily:"'JetBrains Mono',monospace",textAlign:"right"}},"MoM")),
    data.map(function(d,i){
      var isHL=d.bank==="Banco de Chile";
      var share=total>0?(d.val/total*100):0;
      var pct=data[0]&&data[0].val?(d.val/data[0].val*100):0;
      var yoyVal=prevYear?gv(prevYear,d.bank,kpi,prod,ta):null;
      var momVal=prevMonth?gv(prevMonth,d.bank,kpi,prod,ta):null;
      var yoy=yoyVal&&yoyVal>0?((d.val-yoyVal)/yoyVal*100):null;
      var mom=momVal&&momVal>0?((d.val-momVal)/momVal*100):null;
      return ce('div',{key:i,style:{display:"flex",alignItems:"center",gap:6}},
        ce('div',{style:{width:52,fontSize:10,color:isHL?HL:P.t2,fontWeight:isHL?800:500,textAlign:"right",flexShrink:0}},SHORT[d.bank]),
        ce('div',{style:{flex:1,height:26,background:"rgba(255,255,255,0.03)",borderRadius:4,overflow:"hidden",position:"relative"}},
          ce('div',{style:{width:pct+"%",height:"100%",background:isHL?"linear-gradient(90deg,"+P.bchi+","+P.bchiL+")":BC[d.bank]+"44",borderRadius:4,minWidth:2}}),
          ce('div',{style:{position:"absolute",top:0,left:0,right:0,bottom:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.7)",fontFamily:"'JetBrains Mono',monospace"}},share.toFixed(1)+"%")),
        ce('div',{style:{width:82,fontSize:11,fontWeight:isHL?800:500,color:isHL?P.t1:P.t2,textAlign:"right",fontFamily:"'JetBrains Mono',monospace",flexShrink:0}},unit==="$"?"$"+fmtD(d.val):fmtD(d.val)),
        ce('div',{style:{width:50,fontSize:9,color:yoy!=null?(yoy>=0?P.green:P.red):P.t2,textAlign:"right",fontFamily:"'JetBrains Mono',monospace",flexShrink:0}},yoy!=null?fmtDelta(yoy):"-"),
        ce('div',{style:{width:50,fontSize:9,color:mom!=null?(mom>=0?P.green:P.red):P.t2,textAlign:"right",fontFamily:"'JetBrains Mono',monospace",flexShrink:0}},mom!=null?fmtDelta(mom):"-"))

/* ═══ TIME SERIES STACKED BAR ═══ */
function TimeSeriesChart(props){
  var ref=useRef(null);var chart=useRef(null);
  useEffect(function(){
    if(chart.current)chart.current.destroy();
    var ctx=ref.current.getContext('2d');
    var ABK=props.active||BN;
    var datasets=ABK.map(function(b){return{
      label:b,data:MONTHS.map(function(m){return gv(m,b,props.kpi,props.prod,props.ta)}),
      backgroundColor:b==="Banco de Chile"?P.bchi:BC[b]+"88",borderColor:b==="Banco de Chile"?P.bchi:BC[b],borderWidth:1
    }});
    chart.current=new Chart(ctx,{type:'bar',data:{labels:MONTHS,datasets:datasets},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
        tooltip:{backgroundColor:'#111827',borderColor:'#1E293B',borderWidth:1,titleColor:'#94A3B8',bodyColor:'#F1F5F9',
          callbacks:{afterBody:function(items){
            if(!items||!items.length)return'';
            var idx=items[0].dataIndex;var month=MONTHS[idx];
            var total=0;ABK.forEach(function(b){var v=gv(month,b,props.kpi,props.prod,props.ta);if(v)total+=v});
            if(total<=0)return'';
            var bank=items[0].dataset.label;var val=gv(month,bank,props.kpi,props.prod,props.ta);
            return val?'Share: '+(val/total*100).toFixed(1)+'%':''}}}},
        scales:{x:{stacked:true,grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#94A3B8',font:{size:9},maxRotation:45}},
          y:{stacked:true,grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#94A3B8',font:{size:9}}}}}});
    return function(){if(chart.current)chart.current.destroy()};
  },[props.kpi,props.prod,props.ta]);
  return ce('canvas',{ref:ref});
}

/* ═══ YoY SERIES CHART ═══ */
function YoYSeriesChart(props){
  var ref=useRef(null);var chart=useRef(null);
  useEffect(function(){
    if(chart.current)chart.current.destroy();
    var ctx=ref.current.getContext('2d');
    var validMonths=MONTHS.filter(function(m,i){return i>=12});
    var ABK=props.active||BN;
    var datasets=ABK.map(function(b){return{
      label:b,borderColor:b==="Banco de Chile"?P.bchi:BC[b],borderWidth:b==="Banco de Chile"?3:1.5,
      pointRadius:0,tension:0.3,spanGaps:true,
      data:validMonths.map(function(m){
        var mi=MONTHS.indexOf(m);var cur=gv(m,b,props.kpi,props.prod,props.ta);
        var prev=gv(MONTHS[mi-12],b,props.kpi,props.prod,props.ta);
        return cur&&prev&&prev>0?Math.round((cur-prev)/prev*1000)/10:null})
    }});
    chart.current=new Chart(ctx,{type:'line',data:{labels:validMonths,datasets:datasets},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
        tooltip:{backgroundColor:'#111827',borderColor:'#1E293B',borderWidth:1,titleColor:'#94A3B8',bodyColor:'#F1F5F9',

    return function(){if(chart.current)chart.current.destroy()};

}

/* ═══ MS monthly builder ═══ */
function buildMSM(seriesKey,visibleBanks){
  var src=_D.MSM[seriesKey]||[];
  var dates=[];var seen={};
  src.forEach(function(d){if(!seen[d[0]]){seen[d[0]]=true;dates.push(d[0])}});
  dates.sort();
  var ld={};var vd={};BN.forEach(function(b,i){ld[i]={};vd[i]={}});
  src.forEach(function(d){ld[d[1]][d[0]]=d[2];vd[d[1]][d[0]]=d[3]});
  return{dates:dates,
    lines:BN.map(function(b,i){return{name:b,color:BC[b],data:ld[i],visible:visibleBanks?visibleBanks.indexOf(b)>=0:true}}),
    vals:vd,suffix:"%"};
}

/* ═══ DT builder ═══ */
function buildDT(metric,prodType,visibleBanks){
  var src=prodType==="D"?_D.DTD:_D.DT;
  var seen={};var dates=[];
  src.forEach(function(d){if(!seen[d[0]]){seen[d[0]]=true;dates.push(d[0])}});
  dates.sort();
  var fIdx={a:2,t:3,s:4,f:5,ct:6,gp:6,gt:7};
  var idx=fIdx[metric]||2;
  var ld={};BN.forEach(function(b,i){ld[i]={}});
  src.forEach(function(d){if(ld[d[1]]!=null)ld[d[1]][d[0]]=d[idx]});
  var suffix=metric==="a"||metric==="gp"?"%":"$";if(metric==="f")suffix="x";
  return{dates:dates,lines:BN.map(function(b,i){return{name:b,color:BC[b],data:ld[i],visible:visibleBanks?visibleBanks.indexOf(b)>=0:true}}),suffix:suffix};
}

/* ═══ Adicionales monthly builder ═══ */

/* Get derived metrics */
function getDerived(m,b,pt){
  if(pt==="D"){
    var tv=gv(m,b,"Tarjetas Vigentes","D","X");var to=gv(m,b,"Tarjetas con Operaciones","D","X");
    var mt=gv(m,b,"Monto Transacciones","D","X");var nt=gv(m,b,"Nro Transacciones","D","X");
    var mg=gv(m,b,"Monto Giros","D","X");var ng=gv(m,b,"Nro Giros","D","X");
    return{act:tv&&to?(to/tv*100):null,freq:to&&nt?(nt/to):null,ticket:mt&&nt?(mt/nt*1e6):null,spend:mt&&to?(mt/to*1e6):null,giro_pct:mg&&mt?(mg/(mt+mg)*100):null,giro_ticket:mg&&ng?(mg/ng*1e6):null};
  }
  var tv=gv(m,b,"Tarjetas Vigentes","C","X");var to=gv(m,b,"Tarjetas con Operaciones","C","X");
  var mc=gv(m,b,"Monto Compras","C","X");var nc=gv(m,b,"Nro Compras","C","X");
  var ma=gv(m,b,"Monto Avances Efectivo","C","X");var na2=gv(m,b,"Nro Avances Efectivo","C","X");
  var mcs=gv(m,b,"Monto Cargos Servicios","C","X");var ncs=gv(m,b,"Nro Cargos Servicios","C","X");
  return{act:tv&&to?(to/tv*100):null,freq:to&&nc?(nc/to):null,ticket:mc&&nc?(mc/nc*1e6):null,spend:mc&&to?(mc/to*1e6):null,
    avance_pct:ma&&mc?(ma/(mc+ma)*100):null,avance_ticket:ma&&na2?(ma/na2*1e6):null,
    cs_ticket:mcs&&ncs?(mcs/ncs*1e6):null,cs_per_card:mcs&&to?(mcs/to*1e6):null};
}
